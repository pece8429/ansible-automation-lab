---
- name: Simulate change validation and incident enrichment
  hosts: routers
  gather_facts: no
  tasks:
    - name: Ensure reports directory exists
      file:
        path: "{{ playbook_dir }}/../reports"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Check if generated config exists
      stat:
        path: "{{ playbook_dir }}/../configs/{{ inventory_hostname }}.conf"
      register: config_file
      delegate_to: localhost

    - name: Fail if generated config is missing
      fail:
        msg: "Generated config missing for {{ inventory_hostname }}"
      when: not config_file.stat.exists

    - name: Simulate change lookup via API
      uri:
        url: "https://jsonplaceholder.typicode.com/todos/1"
        method: GET
        return_content: yes
      register: change_api_response
      delegate_to: localhost

    - name: Set simulated change status
      set_fact:
        change_found: "{{ change_api_response.json.completed | default(false) }}"
        change_id: "CHG001001"

    - name: write enrichment report when change is found
      copy:
        dest: "{{ playbook_dir }}/../reports/{{ inventory_hostname }}_incident_report.txt"
        content: |
          Device: {{ inventory_hostname }}
          Config File: {{ playbook_dir }}/../configs/{{ inventory_hostname }}.conf
          Change Found: yes
          Change ID: {{ change_id }}
          Incident Status: NORMAL
          Action: incident enriched with active change reference
      when: change_found
      delegate_to: localhost

    - name: Write Enrichment report when no change is found
      copy:
        dest: "{{ playbook_dir }}/../reports/{{ inventory_hostname }}_incident_report.txt"
        content: |
          Device: {{ inventory_hostname }}
          Config File: {{ playbook_dir }}/../configs/{{ inventory_hostname }}.conf
          Change Found: no
          Change ID: none 
          Incident Status: INVESTIGATE 
          Action: Flag incident for investigation 
      when: not change_found 
      delegate_to: localhost 
