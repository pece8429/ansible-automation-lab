---
- name: Ensure configs directory exists
  file:
    path: configs
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true
  
- name: Generate router configuration
  template:
    src: router.conf.j2
    dest: "{{ playbook_dir }}/../configs/{{ inventory_hostname }}.conf"
  delegate_to: localhost
